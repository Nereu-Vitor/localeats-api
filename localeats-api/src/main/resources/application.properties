# Project configuration
spring.application.name=localeats-api

# Terminal appearance
spring.output.ansi.enabled=always

# Database config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/localeats_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate Confug
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Config
jwt.secret=LocalEatsAPISecretKeyToGenerateSecurityToken2026
jwt.expiration=86400000